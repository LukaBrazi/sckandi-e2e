name: Playwright E2E

on:
  # Manual trigger or triggered by main repo via repository_dispatch
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to run tests against"
        required: false
        default: "http://localhost:8080"

  repository_dispatch:
    types: [run-e2e]

jobs:
  e2e:
    name: E2E Tests (Chromium)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout E2E repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: ${{ github.event.inputs.base_url || github.event.client_payload.base_url || vars.E2E_BASE_URL || 'http://localhost:8080' }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
